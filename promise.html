<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- promise is a chain method ,it executes one by one(it is a disadvantage) -->
    <script>

        //resolve in settimeout makes the asyncronous as synchronous
        const fun = () => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    console.log("func");
                    resolve();
                }, 3000);
            });
        };

        const fun1 = () => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    console.log("func-1");
                    resolve();
                }, 2000);
            });
        };

        const fun2 = () => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    console.log("func-2");
                    resolve();
                }, 1000);
            });
        };

        // Corrected version
        fun().then(() => {
            fun1().then(()=>{
                return fun2();
            })
        });
    </script>
</body>
</html>
